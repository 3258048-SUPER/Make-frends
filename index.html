<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be the One</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#080810; }
#stage { position:relative; width:100vw; height:100vh; overflow:hidden; cursor:none; }
canvas { display:block; width:100%; height:100%; }
#cursor-dot {
  position:absolute; pointer-events:none;
  border-radius:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  background:rgba(255,255,255,0.55);
}
#title {
  position:absolute; bottom:28px; left:50%;
  transform:translateX(-50%);
  font-family:Georgia,'Times New Roman',serif;
  font-size:13px; letter-spacing:0.20em;
  color:rgba(255,255,255,0.22);
  pointer-events:none; white-space:nowrap;
}
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="cursor-dot"></div>
  <div id="title">Be the One</div>
</div>
<script>
const stage  = document.getElementById('stage');
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dot    = document.getElementById('cursor-dot');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();

// ── mouse ──────────────────────────────────────────────
const mouse = { x:-999, y:-999, active:false };
let lastMX = -999, lastMY = -999;
let mouseSpeed  = 0;
let calmTimer   = 0;        // counts up while slow, resets on fast move
let disturbTimer = 0;       // counts down after disturbance — flee zone stays large

const SPEED_LIMIT  = 2.0;   // px/frame threshold
const CALM_FRAMES  = 600;   // 10s — cursor dot grows over this
const SIZE_DELAY   = 300;   // 5s before dot starts growing
const SIZE_FRAMES  = 300;   // 5s to fully grow
const DISTURB_TTL  = 900;   // 15s for disturbTimer to drain (= how long flee zone stays large after disturbance)
const FLEE_MAX     = 150;   // flee radius when fully disturbed
const FLEE_MIN     = 0;     // flee radius when fully calm (particles can pass through)

const COLORS = ['#FF3B5C','#FF8C00','#C9FF00','#00FFCC','#AA55FF','#FF44AA','#55AAFF','#FFFFFF'];

// ── Particle ───────────────────────────────────────────
class Particle {
  constructor() { this.init(); }
  init() {
    this.x  = 60 + Math.random()*(W-120);
    this.y  = 60 + Math.random()*(H-120);
    this.hx = this.x;
    this.hy = this.y;
    this.type = Math.random() < 0.5 ? 'roamer' : 'settler';
    const spd = this.type === 'roamer' ? 0.6 + Math.random()*1.2 : 0.0;
    const ang = Math.random()*Math.PI*2;
    this.vx = Math.cos(ang)*spd;
    this.vy = Math.sin(ang)*spd;
    this.r     = 4 + Math.random()*13;
    this.fill  = COLORS[Math.floor(Math.random()*COLORS.length)];
    this.alpha = 0.55 + Math.random()*0.45;
    this.angle = Math.random()*Math.PI*2;
    this.spin  = (Math.random()-0.5)*0.02;
    this.shape = Math.random()<0.28 ? 'rect' : 'circle';
    this.squeeze = 1;
    this.bonds = [];
  }
  update(all, fleeR) {
    const dx   = this.x - mouse.x;
    const dy   = this.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (mouse.active && fleeR > 1 && dist < fleeR + this.r && dist > 0.5) {
      // flee — strength proportional to current fleeR (so as zone shrinks, push weakens)
      const t = Math.max(0, (fleeR + this.r - dist) / (fleeR + this.r));
      const force = Math.pow(t, 1.8) * 7 * (fleeR / FLEE_MAX);
      this.vx += (dx/dist)*force;
      this.vy += (dy/dist)*force;
      this.squeeze = 0.65 + t*0.35;
    } else {
      this.squeeze += (1-this.squeeze)*0.07;
      // drift home — very slow
      this.vx += (this.hx-this.x)*0.003;
      this.vy += (this.hy-this.y)*0.003;
    }

    if (this.type === 'roamer') {
      // roamers wander freely
      this.vx += (Math.random()-0.5)*0.09;
      this.vy += (Math.random()-0.5)*0.09;
      const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
      if (spd > 2.0) { this.vx=this.vx/spd*2.0; this.vy=this.vy/spd*2.0; }
      this.vx *= 0.96; this.vy *= 0.96;
    } else {
      // settlers stay near home — tiny drift, mostly still
      this.vx += (this.hx-this.x)*0.015 + (Math.random()-0.5)*0.02;
      this.vy += (this.hy-this.y)*0.015 + (Math.random()-0.5)*0.02;
      this.vx *= 0.80; this.vy *= 0.80;
    }
    this.x  += this.vx; this.y  += this.vy;
    this.angle += this.spin;

    // bounce walls
    if (this.x < this.r)     { this.x = this.r;     this.vx *= -0.7; }
    if (this.x > W-this.r)   { this.x = W-this.r;   this.vx *= -0.7; }
    if (this.y < this.r)     { this.y = this.r;     this.vy *= -0.7; }
    if (this.y > H-this.r)   { this.y = H-this.r;   this.vy *= -0.7; }

    // home drifts: roamers wander more, settlers barely move
    const homeDrift = this.type === 'roamer' ? 0.5 : 0.05;
    this.hx += (Math.random()-0.5)*homeDrift;
    this.hy += (Math.random()-0.5)*homeDrift;
    this.hx = Math.max(60, Math.min(W-60, this.hx));
    this.hy = Math.max(60, Math.min(H-60, this.hy));

    // bonds
    this.bonds = [];
    for (const p of all) {
      if (p===this) continue;
      const bx=p.x-this.x, by=p.y-this.y;
      const bd=Math.sqrt(bx*bx+by*by);
      if (bd<90) this.bonds.push({p,d:bd});
    }
  }
  drawBonds() {
    for (const b of this.bonds) {
      ctx.beginPath();
      ctx.moveTo(this.x,this.y); ctx.lineTo(b.p.x,b.p.y);
      ctx.strokeStyle = this.fill;
      ctx.globalAlpha = (1-b.d/90)*0.18*this.alpha;
      ctx.lineWidth = 0.5; ctx.stroke();
    }
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x,this.y); ctx.rotate(this.angle);
    ctx.scale(this.squeeze, 1/Math.max(this.squeeze,0.5));
    ctx.fillStyle = this.fill;
    if (this.shape==='circle') { ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill(); }
    else { const s=this.r*1.5; ctx.fillRect(-s/2,-s/2,s,s); }
    ctx.restore();
  }
}

const particles = Array.from({length:75}, ()=>new Particle());

const trail = document.createElement('canvas');
const tCtx  = trail.getContext('2d');
function ensureTrail() { if(trail.width!==W||trail.height!==H){trail.width=W;trail.height=H;} }

// ── main loop ──────────────────────────────────────────
function loop() {
  ensureTrail();

  // update mouse speed
  const moved = Math.sqrt(Math.pow(mouse.x-lastMX,2)+Math.pow(mouse.y-lastMY,2));
  mouseSpeed = mouse.active ? moved : 0;
  lastMX = mouse.x; lastMY = mouse.y;

  const fast = mouse.active && mouseSpeed > SPEED_LIMIT;

  if (fast) {
    calmTimer    = 0;
    disturbTimer = DISTURB_TTL;         // reset disturbance clock
  } else if (mouse.active) {
    calmTimer    = Math.min(calmTimer+1, CALM_FRAMES*3);
    if (calmTimer >= 300) disturbTimer = Math.max(0, disturbTimer-1); // drain only after 5s calm
  }

  // flee radius: large right after disturbance, shrinks to 0 as disturbTimer drains
  const disturbNorm = disturbTimer / DISTURB_TTL;         // 1=just disturbed, 0=settled
  const currentFleeR = FLEE_MIN + (FLEE_MAX - FLEE_MIN) * disturbNorm;

  // trail
  tCtx.fillStyle='rgba(8,8,16,0.20)'; tCtx.fillRect(0,0,W,H);
  ctx.clearRect(0,0,W,H); ctx.drawImage(trail,0,0); ctx.globalAlpha=1;

  for (const p of particles) p.update(particles, currentFleeR);
  for (const p of particles) p.drawBonds();
  ctx.globalAlpha=1;
  for (const p of particles) {
    p.draw();
    tCtx.save(); tCtx.globalAlpha=p.alpha*0.11; tCtx.fillStyle=p.fill;
    tCtx.translate(p.x,p.y); tCtx.rotate(p.angle);
    if(p.shape==='circle'){tCtx.beginPath();tCtx.arc(0,0,p.r*p.squeeze,0,Math.PI*2);tCtx.fill();}
    else{const s=p.r*1.5*p.squeeze;tCtx.fillRect(-s/2,-s/2,s,s);}
    tCtx.restore();
  }

  // cursor dot
  if (mouse.active) {
    const sizeProgress = Math.max(0, calmTimer-SIZE_DELAY) / SIZE_FRAMES;
    const sizeNorm = Math.min(1, sizeProgress);
    const ringSize = 8 + sizeNorm*15;
    dot.style.width  = ringSize+'px';
    dot.style.height = ringSize+'px';
    dot.style.left   = mouse.x+'px';
    dot.style.top    = mouse.y+'px';
    dot.style.opacity = '1';
    dot.style.background = `rgba(255,255,255,${0.35+sizeNorm*0.4})`;
  }

  requestAnimationFrame(loop);
}
loop();

stage.addEventListener('mousemove', e=>{
  mouse.x=e.clientX; mouse.y=e.clientY; mouse.active=true; dot.style.opacity='1';
});
stage.addEventListener('mouseleave', ()=>{
  mouse.active=false; dot.style.opacity='0'; calmTimer=0;
});
stage.addEventListener('touchmove', e=>{
  e.preventDefault();
  mouse.x=e.touches[0].clientX; mouse.y=e.touches[0].clientY; mouse.active=true;
},{passive:false});
stage.addEventListener('touchend', ()=>{
  mouse.active=false; dot.style.opacity='0'; calmTimer=0;
});
window.addEventListener('resize', resize);
</script>
</body>
</html>
