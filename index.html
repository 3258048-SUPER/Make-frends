
<style>
* { margin:0; padding:0; box-sizing:border-box; }
#stage { position:relative; width:100%; height:600px; overflow:hidden; background:#080810; cursor:none; }
canvas { display:block; width:100%; height:100%; }
#cursor-dot { position:absolute; pointer-events:none; width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.6); transform:translate(-50%,-50%); transition:opacity 0.3s; opacity:0; }
#title { position:absolute; bottom:22px; left:50%; transform:translateX(-50%); font-family:var(--font-serif); font-size:13px; letter-spacing:0.18em; color:rgba(255,255,255,0.22); pointer-events:none; white-space:nowrap; }
</style>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Make Frends — 排除をテーマにしたインタラクティブ作品</h2>

<div id="stage">
  <canvas id="c"></canvas>
  <div id="cursor-dot"></div>
  <div id="title">Make Frends</div>
</div>

<script>
const stage = document.getElementById('stage');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const dot = document.getElementById('cursor-dot');

let W, H;
function resize() { W = canvas.width = stage.offsetWidth; H = canvas.height = stage.offsetHeight; }
resize();

const mouse = { x: -999, y: -999, active: false };
let isolatedTime = 0;
let prevIsolated = false;
let isolatedFlash = 0;

const FLEE = 160;
const COLORS = ['#FF3B5C','#FF8C00','#C9FF00','#00FFCC','#AA55FF','#FF44AA','#55AAFF','#FFFFFF'];

class Particle {
  constructor() { this.spawn(); }
  spawn() {
    this.x = 60 + Math.random()*(W-120);
    this.y = 60 + Math.random()*(H-120);
    this.ox = this.x; this.oy = this.y;
    this.r = 4 + Math.random()*14;
    this.vx = 0; this.vy = 0;
    this.dax = (Math.random()-0.5)*0.016;
    this.day = (Math.random()-0.5)*0.016;
    this.angle = Math.random()*Math.PI*2;
    this.spin = (Math.random()-0.5)*0.025;
    this.shape = Math.random()<0.28 ? 'rect' : 'circle';
    this.fill = COLORS[Math.floor(Math.random()*COLORS.length)];
    this.baseAlpha = 0.55 + Math.random()*0.45;
    this.alpha = this.baseAlpha;
    this.squeeze = 1;
    this.bonds = [];
    this.awareness = 0;
  }
  update(all) {
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const fleeR = FLEE + this.r;

    if (mouse.active && dist < fleeR && dist > 0.5) {
      const t = (fleeR - dist) / fleeR;
      const force = Math.pow(t, 1.6) * 9;
      this.vx += (dx/dist)*force;
      this.vy += (dy/dist)*force;
      this.squeeze = 0.6 + t*0.4;
      this.awareness = Math.min(1, this.awareness + 0.08);
    } else {
      this.squeeze += (1-this.squeeze)*0.09;
      this.awareness *= 0.97;
      this.vx += (this.ox-this.x)*0.006;
      this.vy += (this.oy-this.y)*0.006;
      this.ox += this.dax; this.oy += this.day;
      if (this.ox<30||this.ox>W-30) this.dax*=-1;
      if (this.oy<30||this.oy>H-30) this.day*=-1;
    }

    this.vx *= 0.87; this.vy *= 0.87;
    this.x += this.vx; this.y += this.vy;
    this.angle += this.spin;

    if (this.x<-60) this.x=W+30;
    if (this.x>W+60) this.x=-30;
    if (this.y<-60) this.y=H+30;
    if (this.y>H+60) this.y=-30;

    this.bonds = [];
    for (const p of all) {
      if (p===this||p.awareness>0.5) continue;
      const bx=p.x-this.x, by=p.y-this.y;
      const bd=Math.sqrt(bx*bx+by*by);
      if (bd<80) this.bonds.push({p,d:bd});
    }
  }
  drawBonds() {
    for (const b of this.bonds) {
      ctx.beginPath();
      ctx.moveTo(this.x,this.y);
      ctx.lineTo(b.p.x,b.p.y);
      ctx.strokeStyle = this.fill;
      ctx.globalAlpha = (1-b.d/80)*0.20*this.alpha;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);
    ctx.scale(this.squeeze,1/Math.max(this.squeeze,0.5));
    ctx.fillStyle = this.fill;
    if (this.shape==='circle') { ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill(); }
    else { const s=this.r*1.5; ctx.fillRect(-s/2,-s/2,s,s); }
    ctx.restore();
  }
}

const particles = Array.from({length:75},()=>new Particle());

const trail = document.createElement('canvas');
const tCtx = trail.getContext('2d');
function ensureTrail() { if(trail.width!==W||trail.height!==H){trail.width=W;trail.height=H;} }

function loop() {
  ensureTrail();
  tCtx.fillStyle='rgba(8,8,16,0.19)';
  tCtx.fillRect(0,0,W,H);

  ctx.clearRect(0,0,W,H);
  ctx.drawImage(trail,0,0);
  ctx.globalAlpha=1;

  for (const p of particles) p.update(particles);
  for (const p of particles) p.drawBonds();
  ctx.globalAlpha=1;
  for (const p of particles) {
    p.draw();
    tCtx.save();
    tCtx.globalAlpha=p.alpha*0.12;
    tCtx.fillStyle=p.fill;
    tCtx.translate(p.x,p.y);
    tCtx.rotate(p.angle);
    if(p.shape==='circle'){tCtx.beginPath();tCtx.arc(0,0,p.r*p.squeeze,0,Math.PI*2);tCtx.fill();}
    else{const s=p.r*1.5*p.squeeze;tCtx.fillRect(-s/2,-s/2,s,s);}
    tCtx.restore();
  }

  if (mouse.active) {
    let nearCount = 0;
    for (const p of particles) {
      const dx=p.x-mouse.x, dy=p.y-mouse.y;
      if (Math.sqrt(dx*dx+dy*dy) < FLEE+p.r) nearCount++;
    }

    const isolated = nearCount === 0;
    if (isolated) {
      isolatedTime++;
      if (!prevIsolated) isolatedFlash = 1;
    } else {
      isolatedTime = 0;
    }
    prevIsolated = isolated;

    if (isolatedFlash > 0) {
      ctx.save();
      ctx.globalAlpha = isolatedFlash * 0.06;
      ctx.fillStyle = '#FF3B5C';
      ctx.fillRect(0,0,W,H);
      ctx.restore();
      isolatedFlash *= 0.85;
    }

    const isolated2 = isolatedTime > 0;
    dot.style.width = (isolated2 ? 14 : 9)+'px';
    dot.style.height = (isolated2 ? 14 : 9)+'px';
    dot.style.background = isolated2 ? 'rgba(255,80,80,0.7)' : 'rgba(255,255,255,0.55)';
    dot.style.opacity = '1';
    dot.style.left = mouse.x+'px';
    dot.style.top = mouse.y+'px';
  }

  requestAnimationFrame(loop);
}
loop();

stage.addEventListener('mousemove', e => {
  const r = stage.getBoundingClientRect();
  mouse.x = e.clientX-r.left; mouse.y = e.clientY-r.top;
  mouse.active = true; dot.style.opacity='1';
});
stage.addEventListener('mouseleave', () => { mouse.active=false; dot.style.opacity='0'; });
stage.addEventListener('touchmove', e => {
  e.preventDefault();
  const r=stage.getBoundingClientRect();
  mouse.x=e.touches[0].clientX-r.left; mouse.y=e.touches[0].clientY-r.top;
  mouse.active=true;
},{passive:false});
stage.addEventListener('touchend',()=>{mouse.active=false;dot.style.opacity='0';});
window.addEventListener('resize',resize);
</script>
